name: E2E (axe + parity)

# Browser-level gate for the built workspace UI. Runs the committed
# end-to-end suites on every pull request and every push to main:
#
#   * tests/accessibility/axe-all-views.spec.ts — a real axe-core drive over
#     every SPA view in both themes; fails on any critical/serious WCAG
#     violation.
#   * tests/ui-parity/parity-behavior.spec.ts — behavioural contracts for the
#     design-comp parity work, including the markdown-link XSS regression.
#   * tests/docs/docs-under-csp.spec.ts — loads the self-hosted Swagger /docs
#     under the enforced CSP and fails on any CSP-violation console error
#     (proves the docs FUNCTION under the strict CSP, not just reference the
#     right asset URLs).
#   * tests/invariants/real-integration-smoke.spec.ts — drives the REAL sim
#     backend end-to-end with NO page.route mock (the counter to the mocked
#     "e2e" above). Blocking.
#   * tests/invariants/rendering-invariants.spec.ts — global rendering gate
#     (no raw Markdown / no overflow / monotonic timer) against the golden
#     messy fixture. Currently NON-BLOCKING: it is deliberately RED against the
#     known #29/#30/#33 bugs (see docs/analysis/03-enforcement-machinery.md).
#     The PR that fixes those bugs turns it green and REMOVES continue-on-error
#     below — that flip is the enforcement handoff.
#
# The mocked suites are hermetic: the FastAPI app is self-started by
# Playwright's webServer (local_simulation, no live OpenRouter calls) and every
# query POST is mocked per-test, so the job needs no secrets and no network
# egress. The real-integration smoke uses the same self-started sim backend but
# no per-test mock.
#
# retries are set to 0 here on purpose — the suites are deterministic by
# construction (per-test isolation, no shared run-state dependence), so a
# failure is a real failure, never something to paper over with a re-run.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e:
    name: e2e axe + parity (chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # The app boots without a live OpenRouter key: every query falls back to
      # local_simulation, which is exactly what the mocked suites expect. No
      # network egress is required.
      OPENROUTER_LIVE_EXECUTION_ENABLED: "false"
      QUORUM_RUNTIME_ENVIRONMENT: "ci"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install backend dependencies
        run: uv sync --all-extras --dev

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: e2e/package-lock.json

      - name: Install e2e dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright Chromium (+ system deps)
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Run axe + parity + real-integration suites (blocking)
        working-directory: e2e
        # Playwright's webServer self-starts the FastAPI app (see
        # e2e/playwright.config.ts). --retries=0 keeps the gate honest: no
        # flaky-masking retries. CI=true makes the config run serially with a
        # fresh server, forbid `.only`, and use the bundled Chromium.
        env:
          CI: "true"
        run: >-
          npx playwright test
          tests/accessibility/axe-all-views.spec.ts
          tests/ui-parity/parity-behavior.spec.ts
          tests/docs/docs-under-csp.spec.ts
          tests/invariants/real-integration-smoke.spec.ts
          --project=chromium
          --retries=0

      - name: Run UI rendering invariants (BLOCKING)
        working-directory: e2e
        # These assert no raw Markdown / no overflow / a monotonic timer against
        # the golden messy fixture. The #29 (monotonic timer) and #30 (markdown
        # on all provider-prose surfaces + underscore/blockquote formatter
        # extension) fixes have landed and turn these GREEN, so the gate is now
        # HARD: continue-on-error was removed (the enforcement handoff). A red
        # here is a real regression and blocks the merge.
        env:
          CI: "true"
        run: >-
          npx playwright test
          tests/invariants/rendering-invariants.spec.ts
          --project=chromium
          --retries=0

      - name: Run visual snapshots (BLOCKING)
        working-directory: e2e
        # toHaveScreenshot baselines for the result + transcript views against the
        # golden messy fixture — the human-reviewed guard for the #33 layout.
        # The *-linux.png baselines were seeded in THIS CI container by
        # seed-visual-baselines.yml (--update-snapshots) and committed; here they
        # are COMPARED like-for-like. Dynamic regions (timer/run-id) + toasts are
        # masked/hidden so the diff never flakes.
        env:
          CI: "true"
        run: >-
          npx playwright test
          tests/invariants/visual-snapshots.spec.ts
          --project=chromium
          --retries=0

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            e2e/playwright-report/
            e2e/test-results/
          if-no-files-found: ignore
          retention-days: 7
