name: E2E (axe + parity)

# Browser-level gate for the built workspace UI. Runs the committed
# end-to-end suites on every pull request and every push to main:
#
#   * tests/accessibility/axe-all-views.spec.ts — a real axe-core drive over
#     every SPA view in both themes; fails on any critical/serious WCAG
#     violation.
#   * tests/ui-parity/parity-behavior.spec.ts — behavioural contracts for the
#     design-comp parity work, including the markdown-link XSS regression.
#   * tests/docs/docs-under-csp.spec.ts — loads the self-hosted Swagger /docs
#     under the enforced CSP and fails on any CSP-violation console error
#     (proves the docs FUNCTION under the strict CSP, not just reference the
#     right asset URLs).
#   * tests/invariants/real-integration-smoke.spec.ts — drives the REAL sim
#     backend end-to-end with NO page.route mock (the counter to the mocked
#     "e2e" above). Blocking.
#   * tests/invariants/rendering-invariants.spec.ts — global rendering gate
#     (no raw Markdown / no overflow / monotonic timer) against the golden
#     messy fixture. BLOCKING. It was non-blocking only while it was
#     deliberately RED against the known #29/#30/#33 bugs; those fixes landed,
#     `continue-on-error` was removed, and the flip to hard enforcement is done
#     (see docs/analysis/03-enforcement-machinery.md). A red here is a real
#     regression and blocks the merge.
#   * tests/invariants/visual-snapshots.spec.ts — human-reviewed toHaveScreenshot
#     baselines for the result + transcript views, seeded as *-linux.png in this
#     CI container and compared like-for-like. BLOCKING.
#
# The mocked suites are hermetic: the FastAPI app is self-started by
# Playwright's webServer (local_simulation, no live OpenRouter calls) and every
# query POST is mocked per-test, so the job needs no secrets and no network
# egress. The real-integration smoke uses the same self-started sim backend but
# no per-test mock.
#
# RETRIES ARE ZERO — twice over, on purpose (RB-4):
#   * e2e/playwright.config.ts defaults `retries` to 0 for every lane, CI
#     included. Masking is explicit opt-in via `PW_RETRIES`, for local triage
#     only; it is never ambient and never on here.
#   * every invocation below ALSO passes `--retries=0`, so the gate declares
#     its own terms rather than inheriting whatever the config happens to say.
# The suites are deterministic by construction (per-test isolation, no shared
# run-state dependence), so a failure is a real failure. When one turns out to
# be intermittent anyway, the answer is flake-scan.yml (`--repeat-each=10`,
# measures the true rate) followed by QUARANTINE — never a retry, never a
# widened timeout. Pinned by tests/unit/test_e2e_flake_policy.py.

on:
  # Manual lever: re-run the pipeline on-demand (e.g. after a flake or
  # an Actions hiccup) without inventing a commit. A workflow_dispatch run
  # on main still completes CI/Tests/E2E, which re-fires the workflow_run
  # deploy gate — so it can force a fresh deploy + live verification.
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e:
    name: e2e axe + parity (chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # The app boots without a live OpenRouter key: every query falls back to
      # local_simulation, which is exactly what the mocked suites expect. No
      # network egress is required.
      OPENROUTER_LIVE_EXECUTION_ENABLED: "false"
      QUORUM_RUNTIME_ENVIRONMENT: "ci"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install backend dependencies
        run: uv sync --all-extras --dev

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: e2e/package-lock.json

      - name: Install e2e dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright Chromium (+ system deps)
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Run UI rendering + trust-score invariants (BLOCKING)
        working-directory: e2e
        # DETERMINISTIC gates run FIRST (fail-fast) — before the slower axe/parity
        # suites — so a real regression here surfaces immediately and is never
        # masked or delayed by an unrelated flake in a later step. These assert no
        # raw Markdown / no overflow / a monotonic timer (rendering-invariants) and
        # the FR-016 trust-surface contract (trust-score-invariants). HARD gate:
        # continue-on-error was removed (the enforcement handoff); a red here is a
        # real regression and blocks the merge.
        env:
          CI: "true"
        run: >-
          npx playwright test
          tests/invariants/rendering-invariants.spec.ts
          tests/invariants/trust-score-invariants.spec.ts
          --project=chromium
          --retries=0

      - name: Run axe + parity + real-integration suites (blocking)
        working-directory: e2e
        # Playwright's webServer self-starts the FastAPI app (see
        # e2e/playwright.config.ts). --retries=0 keeps the gate honest: no
        # flaky-masking retries. CI=true makes the config run serially with a
        # fresh server, forbid `.only`, and use the bundled Chromium.
        env:
          CI: "true"
        run: >-
          npx playwright test
          tests/accessibility/axe-all-views.spec.ts
          tests/ui-parity/parity-behavior.spec.ts
          tests/docs/docs-under-csp.spec.ts
          tests/invariants/real-integration-smoke.spec.ts
          tests/degraded/degraded-banner.spec.ts
          --project=chromium
          --retries=0

      - name: Run visual snapshots (BLOCKING)
        working-directory: e2e
        # toHaveScreenshot baselines for the result + transcript views against the
        # golden messy fixture — the human-reviewed guard for the #33 layout.
        # The *-linux.png baselines were seeded in THIS CI container by
        # seed-visual-baselines.yml (--update-snapshots) and committed; here they
        # are COMPARED like-for-like. Dynamic regions (timer/run-id) + toasts are
        # masked/hidden so the diff never flakes.
        #
        # `if: !cancelled()` — run REGARDLESS of a prior step's outcome (but not
        # on cancellation). This is still a HARD gate (it fails the job if IT
        # fails; no continue-on-error), but it is no longer SKIPPED when an
        # earlier step reds — so a flake in the axe/parity suite can never mask a
        # real visual regression here. Independent gates, each reporting itself.
        if: ${{ !cancelled() }}
        env:
          CI: "true"
        # trust-score-visual.spec.ts is BLOCKING alongside visual-snapshots (the
        # repo forbids continue-on-error in e2e.yml — the invariants are hard
        # gates). Its PNGs are seeded by the glob-driven seed-visual-baselines.yml
        # and HUMAN-REVIEWED before merge (§5.3): the operator runs the seed
        # workflow, reviews every new/changed PNG, then this compare goes green.
        run: >-
          npx playwright test
          tests/invariants/visual-snapshots.spec.ts
          tests/invariants/trust-score-visual.spec.ts
          --project=chromium
          --retries=0

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            e2e/playwright-report/
            e2e/test-results/
          if-no-files-found: ignore
          retention-days: 7
