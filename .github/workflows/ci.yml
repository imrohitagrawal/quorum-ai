name: CI
on:
  pull_request:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v4
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Validate enterprise factory gates
        run: make validate
      - name: Assert openapi.yaml is in sync with app.openapi()
        run: make openapi-check
      - name: Format check
        run: make format-check
      - name: Lint
        run: make lint
      - name: Type check
        run: make type-check
      - name: Unit tests
        run: make test-report
      - name: Security scan
        run: make security-scan
      - name: Build Docker image
        run: make docker-build
      - name: Upload release evidence artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-hardening-evidence
          path: |
            build/test-results/pytest.xml
            build/coverage/coverage.xml
            build/security/security-scan.json
          if-no-files-found: error

  codex-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      # Enable after storing OPENAI_API_KEY as a GitHub secret.
