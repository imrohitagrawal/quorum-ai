name: Deploy to Fly.io

# Deploys the app to Fly.io. Gated on ALL required CI workflows: this runs only
# AFTER every required workflow — "CI" (ci.yml), "Tests" (test.yml), and
# "E2E (axe + parity)" (e2e.yml) — has concluded SUCCESSFULLY for the SAME commit
# on main. A red build in ANY of the three never reaches production (issues #21,
# #37). ``workflow_dispatch`` remains as a manual escape hatch (deploys whatever
# is on the default branch, ungated — operator's explicit choice).
#
# Mechanism: each of the three workflows completing on main fires this via
# ``workflow_run``. The `gate` job (``scripts/deploy_gate.py``) then WAITS —
# bounded poll of the Actions API for the head SHA — until every required
# workflow reaches a terminal conclusion, and lets `deploy` run only when ALL
# three are green. Waiting (rather than the old skip-and-hope) removes the race
# where a trigger from a fast check ran the gate before the slow E2E finished,
# skipped, and no later trigger deployed — leaving a merge silently undeployed
# (PR #44). A per-SHA concurrency group collapses duplicate triggers to one.
on:
  workflow_run:
    workflows: ["CI", "Tests", "E2E (axe + parity)"]
    types: [completed]
  workflow_dispatch:

# Collapse duplicate triggers for the same commit (three workflows finishing
# close together) into one deploy; a newer trigger for the same SHA supersedes.
concurrency:
  group: deploy-fly-${{ github.event.workflow_run.head_sha || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  gate:
    name: Gate — require CI + Tests + E2E green for the SHA
    runs-on: ubuntu-latest
    # Only consider deploying on a manual dispatch, or when a required workflow
    # finished with success for a GENUINE push to our repo's main. The
    # ``event == 'push'`` + ``head_repository.full_name == github.repository``
    # conditions are security-critical: ``head_branch == 'main'`` alone is
    # spoofable by a fork PR whose source branch is literally named ``main``
    # (that run would carry attacker code + an attacker commit). Requiring a
    # push from our own repo defeats that (a fork PR run is ``pull_request`` on
    # the fork). ``scripts/deploy_gate.py`` re-applies the same filter per run.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'main' &&
       github.event.workflow_run.head_repository.full_name == github.repository)
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Wait for all required workflows to be green for this SHA
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.event.workflow_run.head_sha }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          # The gate WAITS (bounded) for pending required workflows rather than
          # skipping. Comfortably exceeds the slowest required workflow
          # (E2E ≈ 3 min) with runner-load headroom.
          GATE_TIMEOUT_SECONDS: "900"
          GATE_POLL_SECONDS: "15"
        run: python scripts/deploy_gate.py

  deploy:
    name: Deploy to Fly.io
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # For a workflow_run trigger, check out the EXACT commit that passed
          # CI (main's HEAD may have advanced since). For a manual dispatch this
          # resolves to the default ref. This guarantees we deploy the tested SHA.
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Guard — only deploy if this SHA is still main's tip
        id: fresh
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          # The per-SHA concurrency group only serialises deploys of the SAME
          # commit. Because the gate now WAITS (up to ~min) for slow checks, an
          # older commit's deploy can finish AFTER a newer commit already
          # shipped — deploying the older one would regress production. Deploy
          # only when this SHA is still main's tip; otherwise the newer commit's
          # own deploy handles it. (Manual dispatch has no workflow_run SHA →
          # always deploy the default ref.)
          if [ -z "${SHA}" ]; then
            echo "Manual dispatch — deploying default ref."
            echo "deploy=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          TIP=$(gh api "repos/${REPO}/commits/main" --jq .sha)
          if [ "${TIP}" = "${SHA}" ]; then
            echo "SHA ${SHA} is still main's tip — deploying."
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "SHA ${SHA} superseded by main tip ${TIP} — skipping (the newer commit's deploy handles it)."
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Fly.io CLI
        if: steps.fresh.outputs.deploy == 'true'
        # Pinned to a commit SHA (was ``@master``) for a reproducible,
        # supply-chain-safe toolchain — this is the exact revision that ran
        # green on the 2026-07-15 deploy.
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1

      - name: Deploy to Fly.io
        if: steps.fresh.outputs.deploy == 'true'
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only --strategy immediate

      - name: Smoke test - GET /health
        if: steps.fresh.outputs.deploy == 'true'
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          # Wait for the new deploy to become healthy.
          # Fly's edge usually routes to the new instance within 10s.
          for i in {1..12}; do
            if curl -sf -o /dev/null -w "%{http_code}\n" https://quorum-ai.fly.dev/health | grep -q 200; then
              echo "Health check passed after ${i} attempts"
              exit 0
            fi
            echo "Health check failed (attempt ${i}), retrying in 5s..."
            sleep 5
          done
          echo "ERROR: Health check did not pass within 60s"
          exit 1

      - name: Smoke test - GET /ready
        if: steps.fresh.outputs.deploy == 'true'
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          # /ready returns 200 always; the body shows live_readiness state.
          # We assert state == "live" or "live" with drift (catalog mismatch)
          # but NOT "offline_by_*" - that means the deploy is misconfigured.
          RESPONSE=$(curl -sf https://quorum-ai.fly.dev/ready)
          echo "Ready response: $RESPONSE"
          if echo "$RESPONSE" | grep -q '"offline_by_'; then
            echo "ERROR: App booted in offline mode - check OPENROUTER_API_KEY"
            exit 1
          fi
          echo "Ready check passed"
