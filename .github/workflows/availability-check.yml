name: Availability check (prod /ready)

# OD-5: scheduled prod-readiness alert, $0, no new infra.
#
# WHAT IT CHECKS (and how it differs from deploy-drift-watchdog.yml):
#   * deploy-drift-watchdog asks "does main HEAD have a successful Deploy
#     job?" — a PIPELINE signal. It never inspects runtime readiness.
#   * THIS workflow asks "is prod actually serving live right now?" — a
#     RUNTIME signal: GET /ready on both prod hosts must return HTTP 200
#     with live_readiness.state == "live". A funded-key outage, a Fly
#     incident, or a DNS break all surface here even when the deploy
#     pipeline is perfectly green (the OpenRouter-403 incident shape).
#
# THE ALERT: a failing scheduled job triggers GitHub's native workflow-
# failure email. That IS the alert channel — no paid service, no issue
# spam, no webhook infra. docs/80-observability.md documents this as alert
# rule 1 (readiness-not-live, MECHANISED); rule 2 (error-rate over SLO)
# remains documented-not-yet-mechanised there.
#
# HONEST LIMITS of this channel (review finding — know them, they are
# accepted trade-offs for a $0 demo alert):
#   * GitHub auto-disables SCHEDULED workflows after ~60 days without
#     repo activity — the alert dies silently on an abandoned repo.
#   * The failure email goes to the actor attributed to the cron run
#     (the last committer to touch the schedule) and honours that user's
#     Actions notification settings.
#   * GitHub emails on EVERY failed run — a sustained outage at */15 is
#     ~96 emails/day. Loud by design; the operator can pause via the
#     workflow's Disable button during a known incident.
#   * Single-sample check, NO retry (deliberate): one runner-side blip
#     = one email; at a 15-min cadence a transient false positive
#     self-clears on the next run, and a retry loop would mask real
#     flapping. Honest signal over quiet signal.
#
# TRIGGERS — schedule + workflow_dispatch ONLY, and this is load-bearing:
# a slow job on the push path once silently stopped every deploy
# (test_deploy_gate_no_slow_push_jobs.py pins the lesson;
# test_availability_check_workflow.py pins THIS file's trigger surface).
# It must also stay out of scripts/deploy_gate.py's required set.

on:
  schedule:
    - cron: "*/15 * * * *" # every 15 minutes
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: availability-check
  cancel-in-progress: false

jobs:
  check-ready:
    runs-on: ubuntu-latest
    steps:
      - name: Prod /ready must be HTTP 200 with state=live on both hosts
        run: |
          set -uo pipefail
          FAILED=0
          for URL in "https://quorum-ai.fly.dev/ready" "https://quorum.stackclimb.com/ready"; do
            echo "== $URL"
            BODY=$(curl -sS -m 15 -w '\n%{http_code}' "$URL" 2>&1) || {
              echo "FAIL: curl error for $URL:"; echo "$BODY"; FAILED=1; continue;
            }
            CODE=$(printf '%s' "$BODY" | tail -n1)
            JSON=$(printf '%s' "$BODY" | sed '$d')
            echo "http=$CODE body=$JSON"
            if [ "$CODE" != "200" ]; then
              echo "FAIL: $URL returned HTTP $CODE (expected 200)"; FAILED=1; continue;
            fi
            # Guarded assignment: on a non-JSON body (e.g. a 200 HTML error
            # page) jq exits non-zero and its // fallback never fires; the
            # guard keeps the diagnostic honest AND keeps the runner's
            # default `bash -e` from aborting the loop mid-way.
            STATE=$(printf '%s' "$JSON" | jq -r '.live_readiness.state // "MISSING"' 2>/dev/null) || STATE="UNPARSEABLE"
            if [ "$STATE" != "live" ]; then
              REASONS=$(printf '%s' "$JSON" | jq -c '.live_readiness.reasons // []' 2>/dev/null) || REASONS="[unparseable body]"
              echo "FAIL: $URL state=$STATE (expected \"live\"), reasons=$REASONS"; FAILED=1;
            fi
          done
          if [ "$FAILED" -ne 0 ]; then
            echo "Availability check FAILED — the workflow-failure email is the alert."
            exit 1
          fi
          echo "OK: both prod hosts ready and live."
