          minLength: 1
          title: Query Text
      type: object
      required:
      - query_text
      title: QueryRunWarningsRequest
    QueryRunWarningsResponse:
      properties:
        warnings:
          items:
            $ref: '#/components/schemas/SafetyWarning'
          type: array
          title: Warnings
      type: object
      required:
      - warnings
      title: QueryRunWarningsResponse
    ResultProjection:
      properties:
        model_answers:
          items:
            $ref: '#/components/schemas/InitialModelAnswer'
          type: array
          title: Model Answers
        debate_outputs:
          items:
            $ref: '#/components/schemas/DebateOutput'
          type: array
          title: Debate Outputs
        final_synthesis:
          anyOf:
          - $ref: '#/components/schemas/FinalSynthesis'
          - type: 'null'
        agreement:
          $ref: '#/components/schemas/AgreementSummary'
        position_movements:
          items:
            $ref: '#/components/schemas/PositionMovement'
          type: array
          title: Position Movements
      type: object
      required:
      - model_answers
      - debate_outputs
      - final_synthesis
      - agreement
      - position_movements
      title: ResultProjection
    SafetyAcknowledgement:
      properties:
        warning_type:
          $ref: '#/components/schemas/WarningType'
        version:
          type: string
          title: Version
      type: object
      required:
      - warning_type
      - version
      title: SafetyAcknowledgement
    SafetyWarning:
      properties:
        warning_type:
          $ref: '#/components/schemas/WarningType'
        version:
          type: string
          title: Version
        message:
          type: string
          title: Message
        acknowledgement_required:
          type: boolean
          title: Acknowledgement Required
          default: true
      type: object
      required:
      - warning_type
      - version
      - message
      title: SafetyWarning
    SourceReference:
      properties:
        title:
          type: string
          title: Title
        url:
          type: string
          title: Url
        provider:
          $ref: '#/components/schemas/ProviderPath'
        is_fallback:
          type: boolean
          title: Is Fallback
          default: false
      type: object
      required:
      - title
      - url
      - provider
      title: SourceReference
    StageState:
      type: string
      enum:
      - pending
      - running
      - completed
      - failed
      - skipped
      title: StageState
    SynthesisQualityChecks:
      properties:
        citation_coverage_target_met:
          type: boolean
          title: Citation Coverage Target Met
        false_consensus_preserved:
          type: boolean
          title: False Consensus Preserved
        decision_support_framing_present:
          type: boolean
          title: Decision Support Framing Present
        high_stakes_warning_required:
          type: boolean
          title: High Stakes Warning Required
      type: object
      required:
      - citation_coverage_target_met
      - false_consensus_preserved
      - decision_support_framing_present
      - high_stakes_warning_required
      title: SynthesisQualityChecks
    SynthesisStatus:
      type: string
      enum:
      - completed
      - failed
      title: SynthesisStatus
    TokenUsage:
      properties:
        prompt_tokens:
          type: integer
          minimum: 0.0
          title: Prompt Tokens
        completion_tokens:
          type: integer
          minimum: 0.0
          title: Completion Tokens
        total_tokens:
          type: integer
          minimum: 0.0
          title: Total Tokens
      type: object
      required:
      - prompt_tokens
      - completion_tokens
      - total_tokens
      title: TokenUsage
      description: 'Real per-call token usage as reported by the provider.


        Parsed from the ``usage`` object OpenRouter returns on a completed

        ``/chat/completions`` response. Captured so a run''s actual cost can be

        computed from measured tokens rather than the pre-run estimate. Absent

        (``None``) whenever the provider omitted the object or a call did not go

        live — the cost layer treats a missing record as "cannot measure this

        call" and keeps the run tagged ``estimated`` (never fabricates usage).'
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
    WarningType:
      type: string
      enum:
      - sensitive_data
      - high_stakes
      title: WarningType
