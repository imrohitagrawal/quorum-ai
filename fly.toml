# Fly.io configuration for Quorum-AI
#
# Deploy: `fly deploy`
# Secrets: `fly secrets set OPENROUTER_API_KEY=... QUORUM_TOKEN_SECRET=...`
#
# This config assumes a single-instance deployment (no scaling).
# The in-memory state (sessions, query runs) is documented as MVP
# design and is intentional. When you need multiple instances,
# add Fly Postgres + Upstash Redis and refactor the repositories
# in src/product_app/auth.py and src/product_app/query_runs.py.

app = "quorum-ai"
primary_region = "iad"  # US East (Virginia) - adjust to nearest region
kill_signal = "SIGINT"
kill_timeout = "5s"

[env]
  # Production environment variables baked into the image.
  # Secrets go in `fly secrets set`, not here.
  APP_NAME = "Quorum-AI"
  ENVIRONMENT = "production"
  LOG_LEVEL = "INFO"
  RUNTIME_ENVIRONMENT = "production"
  SESSION_COOKIE_SECURE = "true"
  ACCOUNT_LEGACY_HEADER_ENABLED = "false"
  OPENROUTER_APP_URL = "https://quorum-ai.fly.dev"
  OPENROUTER_LIVE_EXECUTION_ENABLED = "false"  # Operator must enable after setting OPENROUTER_API_KEY
  # issue #27: keep the feedback-event SQLite trail on the persistent volume
  # (mounted at /data below), NOT the ephemeral rootfs default (.data/…) which
  # is wiped on every deploy — that erased the self-improving-loop history.
  FEEDBACK_DB_PATH = "/data/feedback_events.sqlite3"
  # R2 S1 (FR-014): durable terminal run-history sink, same persistent volume.
  # Sibling of the feedback trail; wiped-on-deploy would defeat evaluation and
  # (later) operability trends, so it lives on /data too.
  RUN_HISTORY_DB_PATH = "/data/run_history.sqlite3"

[experimental]
  # Required for single-instance state to be stable across deploys.
  # Without this, restart wipes in-memory sessions.
  auto_rollback = true

[[services]]
  protocol = "tcp"
  internal_port = 8000
  processes = ["app"]

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"

  [[services.http_checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"
    method = "get"
    path = "/ready"
    protocol = "http"

  min_machines_running = 0
  auto_stop_machines = "stop"
  auto_start_machines = true

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[deploy]
  release_command = "echo 'Release deploy complete - no migrations needed (in-memory state)'"
  strategy = "rolling"

# NOTE: no `[metrics]` block. The app exposes /health, /ready, /status but no
# Prometheus /metrics endpoint (no exporter is wired), so a `[metrics]` scrape
# would 404 on every poll. Re-add this block only alongside a real /metrics
# route + exporter. See issue #36.

# issue #27: persistent volume for the feedback-event SQLite trail. Without
# this, `.data/…` lives on the ephemeral rootfs and is wiped on every deploy,
# erasing the self-improving-loop history. FEEDBACK_DB_PATH (in [env] above)
# points the store at /data on this volume.
#
# ⚠ OPERATOR PREREQUISITE — the volume MUST exist before this config deploys, or
#   the deploy fails to mount it. Create it ONCE (single-instance app, iad):
#       fly volume create quorum_data --app quorum-ai --region iad --size 1
#   Only merge this change AFTER the volume exists. (This is why the PR adding
#   it is a DRAFT — see MORNING-REPORT.)
[[mounts]]
  source = "quorum_data"
  destination = "/data"
